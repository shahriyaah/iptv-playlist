name: Update Playlist

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify M3U file
        run: |
          echo "Checking playlist..."
          grep "#EXTM3U" Xuck.m3u

      - name: Done
        run: echo "Playlist published successfully"
